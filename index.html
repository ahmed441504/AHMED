<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>مصمم جرافيك احترافي | بورتفوليو</title>
  <meta name="description" content="مصمم جرافيك متخصص في بناء الشعارات، الهويات البصرية، وتصاميم السوشيال ميديا الاحترافية." />

  <!-- ===================================================
       خط Google Fonts - Cairo
       يمكن تغيير الخط إلى Tajawal بتعديل الرابط أدناه
       =================================================== -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />

  <!-- ===================================================
       مكتبة Tailwind CSS عبر CDN
       =================================================== -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- ===================================================
       مكتبة Font Awesome للأيقونات
       =================================================== -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />

  <!-- ===================================================
       إعداد Tailwind Config - اللون الرئيسي الزيتي
       =================================================== -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            olive: {
              DEFAULT: '#16625a',
              light:   '#1d7d73',
              dark:    '#0f4540',
              pale:    '#e8f4f3',
              muted:   '#c2dedd',
            }
          },
          fontFamily: {
            cairo: ['Cairo', 'sans-serif'],
          }
        }
      }
    }
  </script>

  <style>
    /* ===================================================
       الأنماط العامة والمتغيرات
       =================================================== */
    *, *::before, *::after { box-sizing: border-box; }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Cairo', sans-serif;
      background-color: #f9fafb;
      color: #1a1a2e;
      overflow-x: hidden;
    }

    /* ===================================================
       شريط التمرير المخصص
       =================================================== */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #f1f1f1; }
    ::-webkit-scrollbar-thumb { background: #16625a; border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: #0f4540; }

    /* ===================================================
       الهيدر - تأثير Glassmorphism
       =================================================== */
    #navbar {
      backdrop-filter: blur(16px) saturate(180%);
      -webkit-backdrop-filter: blur(16px) saturate(180%);
      background-color: rgba(255, 255, 255, 0.75);
      border-bottom: 1px solid rgba(22, 98, 90, 0.12);
      transition: all 0.35s ease;
    }

    #navbar.scrolled {
      background-color: rgba(255, 255, 255, 0.92);
      box-shadow: 0 4px 30px rgba(22, 98, 90, 0.1);
    }

    /* رابط التنقل - تأثير الخط السفلي */
    .nav-link {
      position: relative;
      transition: color 0.3s ease;
    }
    .nav-link::after {
      content: '';
      position: absolute;
      bottom: -4px;
      right: 0;
      width: 0;
      height: 2px;
      background: #16625a;
      border-radius: 2px;
      transition: width 0.35s ease;
    }
    .nav-link:hover::after,
    .nav-link.active::after { width: 100%; }
    .nav-link:hover { color: #16625a; }

    /* ===================================================
       قسم Hero - الخلفية والنص
       =================================================== */
    #hero {
      background: linear-gradient(135deg, #f0faf9 0%, #e8f4f3 40%, #f9fafb 100%);
      position: relative;
      overflow: hidden;
    }

    /* دوائر زخرفية في الخلفية */
    #hero::before {
      content: '';
      position: absolute;
      top: -120px;
      left: -120px;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(22,98,90,0.08) 0%, transparent 70%);
      border-radius: 50%;
      pointer-events: none;
    }
    #hero::after {
      content: '';
      position: absolute;
      bottom: -80px;
      right: -80px;
      width: 350px;
      height: 350px;
      background: radial-gradient(circle, rgba(22,98,90,0.06) 0%, transparent 70%);
      border-radius: 50%;
      pointer-events: none;
    }

    /* تأثير الكتابة المتحركة */
    .typed-cursor {
      display: inline-block;
      width: 3px;
      height: 1em;
      background: #16625a;
      margin-right: 4px;
      vertical-align: middle;
      animation: blink 0.8s step-end infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    /* ===================================================
       بطاقات الأعمال - Portfolio Cards
       =================================================== */
    .portfolio-card {
      position: relative;
      overflow: hidden;
      border-radius: 16px;
      cursor: pointer;
      transition: transform 0.4s cubic-bezier(0.25, 0.8, 0.25, 1),
                  box-shadow 0.4s ease;
      background: #fff;
      box-shadow: 0 2px 15px rgba(0,0,0,0.07);
    }
    .portfolio-card:hover {
      transform: translateY(-8px) scale(1.01);
      box-shadow: 0 20px 50px rgba(22, 98, 90, 0.18);
    }

    /* طبقة التغطية عند Hover */
    .card-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(22,98,90,0.92) 0%, rgba(22,98,90,0.4) 60%, transparent 100%);
      opacity: 0;
      transition: opacity 0.4s ease;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 1.5rem;
    }
    .portfolio-card:hover .card-overlay { opacity: 1; }

    .card-overlay-content {
      transform: translateY(20px);
      transition: transform 0.4s ease;
    }
    .portfolio-card:hover .card-overlay-content { transform: translateY(0); }

    /* صورة البطاقة */
    .card-img {
      width: 100%;
      height: 260px;
      object-fit: cover;
      display: block;
      transition: transform 0.5s ease;
    }
    .portfolio-card:hover .card-img { transform: scale(1.06); }

    /* ===================================================
       Modal - النافذة المنبثقة
       =================================================== */
    #modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(10, 30, 28, 0.75);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.35s ease;
    }
    #modal-overlay.active {
      opacity: 1;
      pointer-events: all;
    }

    #modal-box {
      background: #fff;
      border-radius: 20px;
      max-width: 780px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      transform: scale(0.88) translateY(30px);
      transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.35s ease;
      opacity: 0;
      box-shadow: 0 30px 80px rgba(0,0,0,0.25);
    }
    #modal-overlay.active #modal-box {
      transform: scale(1) translateY(0);
      opacity: 1;
    }

    /* ===================================================
       أزرار CTA
       =================================================== */
    .btn-primary {
      background: #16625a;
      color: #fff;
      border: 2px solid #16625a;
      padding: 0.75rem 2rem;
      border-radius: 50px;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.3s ease, transform 0.2s ease, box-shadow 0.3s ease;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      text-decoration: none;
    }
    .btn-primary:hover {
      background: #0f4540;
      border-color: #0f4540;
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(22,98,90,0.35);
    }

    .btn-outline {
      background: transparent;
      color: #16625a;
      border: 2px solid #16625a;
      padding: 0.75rem 2rem;
      border-radius: 50px;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.3s ease;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      text-decoration: none;
    }
    .btn-outline:hover {
      background: #16625a;
      color: #fff;
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(22,98,90,0.25);
    }

    /* ===================================================
       أزرار التواصل الاجتماعي
       =================================================== */
    .contact-btn {
      display: flex;
      align-items: center;
      gap: 0.85rem;
      padding: 1rem 1.5rem;
      border-radius: 14px;
      font-weight: 700;
      font-size: 1rem;
      text-decoration: none;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      border: none;
      cursor: pointer;
    }
    .contact-btn:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 30px rgba(0,0,0,0.15);
    }

    /* ===================================================
       حقول النموذج
       =================================================== */
    .form-input {
      width: 100%;
      padding: 0.85rem 1.1rem;
      border: 1.5px solid #d1d5db;
      border-radius: 10px;
      font-family: 'Cairo', sans-serif;
      font-size: 0.95rem;
      color: #1a1a2e;
      background: #fff;
      transition: border-color 0.3s ease, box-shadow 0.3s ease;
      outline: none;
    }
    .form-input:focus {
      border-color: #16625a;
      box-shadow: 0 0 0 3px rgba(22,98,90,0.12);
    }
    .form-input::placeholder { color: #9ca3af; }

    /* ===================================================
       قسم الإحصائيات
       =================================================== */
    .stat-card {
      text-align: center;
      padding: 1.5rem;
      border-radius: 16px;
      background: #fff;
      box-shadow: 0 2px 15px rgba(22,98,90,0.08);
      transition: transform 0.3s ease;
    }
    .stat-card:hover { transform: translateY(-4px); }

    /* ===================================================
       تأثير ظهور العناصر عند التمرير (Scroll Animation)
       =================================================== */
    .reveal {
      opacity: 0;
      transform: translateY(40px);
      transition: opacity 0.7s ease, transform 0.7s ease;
    }
    .reveal.visible {
      opacity: 1;
      transform: translateY(0);
    }

    /* ===================================================
       فلاتر الأعمال
       =================================================== */
    .filter-btn {
      padding: 0.45rem 1.2rem;
      border-radius: 50px;
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      border: 1.5px solid #d1d5db;
      background: #fff;
      color: #6b7280;
      transition: all 0.3s ease;
    }
    .filter-btn:hover,
    .filter-btn.active {
      background: #16625a;
      border-color: #16625a;
      color: #fff;
    }

    /* ===================================================
       الفوتر
       =================================================== */
    footer {
      background: linear-gradient(135deg, #0f4540 0%, #16625a 100%);
    }

    /* ===================================================
       تأثير نبضة على أيقونة الواتساب
       =================================================== */
    .whatsapp-pulse {
      position: relative;
    }
    .whatsapp-pulse::before {
      content: '';
      position: absolute;
      inset: -6px;
      border-radius: 50%;
      background: rgba(37, 211, 102, 0.3);
      animation: pulse-ring 1.8s ease-out infinite;
    }
    @keyframes pulse-ring {
      0%   { transform: scale(0.8); opacity: 0.8; }
      100% { transform: scale(1.5); opacity: 0; }
    }

    /* ===================================================
       مؤشر التحميل للصور
       =================================================== */
    .img-skeleton {
      background: linear-gradient(90deg, #e8f4f3 25%, #c2dedd 50%, #e8f4f3 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
    }
    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* ===================================================
       تعديلات الاستجابة للشاشات الصغيرة
       =================================================== */
    @media (max-width: 640px) {
      .card-img { height: 200px; }
      #hero h1 { font-size: 2rem !important; }
    }
  </style>
</head>
