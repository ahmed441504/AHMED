    <style>
        /* الأنماط العامة والمتغيرات */
        *, *::before, *::after { box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body { font-family: 'Cairo', sans-serif; background-color: #f9fafb; color: #1a1a2e; overflow-x: hidden; }
        
        /* شريط التمرير المخصص */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #16625a; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #0f4540; }
        
        /* الهيدر - تأثير Glassmorphism */
        #navbar {
            backdrop-filter: blur(16px) saturate(180%);
            -webkit-backdrop-filter: blur(16px) saturate(180%);
            background-color: rgba(255, 255, 255, 0.75);
            border-bottom: 1px solid rgba(22, 98, 90, 0.12);
            transition: all 0.35s ease;
        }
        #navbar.scrolled {
            background-color: rgba(255, 255, 255, 0.95);
            box-shadow: 0 4px 30px rgba(22, 98, 90, 0.08);
        }
        
        /* رابط التنقل - تأثير الخط السفلي */
        .nav-link { position: relative; transition: color 0.3s ease; }
        .nav-link::after {
            content: ''; position: absolute; bottom: -4px; right: 0; width: 0; height: 2px;
            background: #16625a; border-radius: 2px; transition: width 0.35s ease;
        }
        .nav-link:hover::after, .nav-link.active::after { width: 100%; }
        .nav-link:hover, .nav-link.active { color: #16625a; }
        
        /* قسم Hero */
        #hero { background: linear-gradient(135deg, #f0faf9 0%, #e8f4f3 40%, #f9fafb 100%); position: relative; overflow: hidden; }
        #hero::before {
            content: ''; position: absolute; top: -120px; left: -120px; width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(22,98,90,0.08) 0%, transparent 70%); border-radius: 50%; pointer-events: none;
        }
        #hero::after {
            content: ''; position: absolute; bottom: -80px; right: -80px; width: 350px; height: 350px;
            background: radial-gradient(circle, rgba(22,98,90,0.06) 0%, transparent 70%); border-radius: 50%; pointer-events: none;
        }
        
        /* تأثير الكتابة المتحركة */
        .typed-cursor { display: inline-block; width: 3px; height: 1em; background: #16625a; margin-right: 4px; vertical-align: middle; animation: blink 0.8s step-end infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        
        /* بطاقات الأعمال */
        .portfolio-card {
            position: relative; overflow: hidden; border-radius: 16px; cursor: pointer;
            transition: transform 0.4s cubic-bezier(0.25, 0.8, 0.25, 1), box-shadow 0.4s ease;
            background: #fff; box-shadow: 0 4px 20px rgba(0,0,0,0.04);
        }
        .portfolio-card:hover { transform: translateY(-8px); box-shadow: 0 20px 40px rgba(22, 98, 90, 0.15); }
        .card-overlay {
            position: absolute; inset: 0; background: linear-gradient(to top, rgba(22,98,90,0.95) 0%, rgba(22,98,90,0.4) 60%, transparent 100%);
            opacity: 0; transition: opacity 0.4s ease; display: flex; flex-direction: column; justify-content: flex-end; padding: 1.5rem; z-index: 20;
        }
        .portfolio-card:hover .card-overlay { opacity: 1; }
        .card-overlay-content { transform: translateY(20px); transition: transform 0.4s ease; }
        .portfolio-card:hover .card-overlay-content { transform: translateY(0); }
        .card-img { width: 100%; height: 260px; object-fit: cover; display: block; transition: transform 0.5s ease; }
        .portfolio-card:hover .card-img { transform: scale(1.06); }
        
        /* Modal - النافذة المنبثقة */
        #modal-overlay {
            position: fixed; inset: 0; background: rgba(10, 30, 28, 0.8); backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px); z-index: 1000; display: flex; align-items: center; justify-content: center;
            padding: 1rem; opacity: 0; pointer-events: none; transition: opacity 0.35s ease;
        }
        #modal-overlay.active { opacity: 1; pointer-events: all; }
        #modal-box {
            background: #fff; border-radius: 20px; max-width: 780px; width: 100%; max-height: 90vh; overflow-y: auto;
            transform: scale(0.9) translateY(30px); transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.35s ease;
            opacity: 0; box-shadow: 0 30px 80px rgba(0,0,0,0.3);
        }
        #modal-overlay.active #modal-box { transform: scale(1) translateY(0); opacity: 1; }
